name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-22.04
    name: Frontend Checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce pnpm policy
        run: |
          test ! -f package-lock.json || {
            echo "package-lock.json is not allowed; this repo is standardized on pnpm."
            exit 1
          }
          node -e "const pkg=require('./package.json'); if (!pkg.packageManager || !pkg.packageManager.startsWith('pnpm@')) { console.error('package.json must declare a pnpm packageManager'); process.exit(1); }"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  rust:
    runs-on: ubuntu-22.04
    name: Rust Checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Run clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Run cargo tests
        working-directory: src-tauri
        run: cargo test
