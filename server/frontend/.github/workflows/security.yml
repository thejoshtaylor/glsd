name: Security

on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "52 4 * * 1"

permissions:
  contents: read

jobs:
  package-policy:
    runs-on: ubuntu-latest
    name: Package Policy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce pnpm policy
        run: |
          test ! -f package-lock.json || {
            echo "package-lock.json is not allowed; this repo is standardized on pnpm."
            exit 1
          }
          node -e "const pkg=require('./package.json'); if (!pkg.packageManager || !pkg.packageManager.startsWith('pnpm@')) { console.error('package.json must declare a pnpm packageManager'); process.exit(1); }"

  frontend-audit:
    runs-on: ubuntu-22.04
    name: Frontend Dependency Audit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high

  rust-audit:
    runs-on: ubuntu-22.04
    name: Rust Dependency Audit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Generate lockfile
        working-directory: src-tauri
        run: cargo generate-lockfile

      - name: Audit Rust dependencies
        working-directory: src-tauri
        run: cargo audit
