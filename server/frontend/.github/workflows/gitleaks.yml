name: Gitleaks

on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "34 4 * * 1"

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    name: Secret Scan

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
